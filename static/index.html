<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMCS LLM - Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Novo Chat
                </button>
            </div>
            
            <div class="chat-history" id="chatHistory">
                <!-- Histórico de conversas será inserido aqui -->
            </div>
            
            <div class="sidebar-footer">
                <div class="settings-panel">
                    <label>
                        <span>Temperatura:</span>
                        <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.8">
                        <span id="temperatureValue">0.8</span>
                    </label>
                    <label>
                        <span>Tamanho máximo:</span>
                        <input type="number" id="maxLength" min="10" max="1000" value="100">
                    </label>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div class="chat-header">
                <h1>LMCS LLM IA</h1>
                <span class="status-indicator" id="statusIndicator">Conectando...</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <h2>Bem-vindo ao LMCS LLM!</h2>
                    <p>Eu sou um modelo Transformer treinado para assistente conversacional. Como posso ajudar?</p>
                    <div class="suggestions">
                        <button class="suggestion-btn" onclick="useSuggestion('Oi, tudo bem?')">
                            Oi, tudo bem?
                        </button>
                        <button class="suggestion-btn" onclick="useSuggestion('Quero contratar um plano')">
                            Quero contratar um plano
                        </button>
                        <button class="suggestion-btn" onclick="useSuggestion('Preciso de suporte técnico')">
                            Preciso de suporte técnico
                        </button>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <form class="chat-input-form" id="chatForm" onsubmit="sendMessage(event)">
                    <textarea 
                        id="messageInput" 
                        placeholder="Digite sua mensagem..." 
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                    <button type="submit" class="send-btn" id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <p class="input-hint">Pressione Enter para enviar, Shift+Enter para nova linha</p>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
